<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Financial Statements — Students Point</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="stylesheet" href="style.css">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
</head>
<body>
<div id="sidebar-root"></div>
<div class="main">
  <div class="pg-header">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:10px">
      <div>
        <div class="pg-title">Financial Statements</div>
        <div class="pg-sub">Income Statement and Balance Sheet — auto-calculated from all records</div>
      </div>
      <button class="btn btn-primary" onclick="window.print()">🖨️ Print Statements</button>
    </div>
  </div>
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('income',this)">📃 Income Statement</button>
    <button class="tab-btn" onclick="switchTab('balance',this)">📊 Balance Sheet</button>
  </div>

  <!-- INCOME STATEMENT -->
  <div class="tab-panel active" id="tab-income">
    <div class="filter-bar">
      <label>Period:</label>
      <button class="quick-btn active" onclick="setIncomePeriod(30,this)">This Month</button>
      <button class="quick-btn" onclick="setIncomePeriod(90,this)">3 Months</button>
      <button class="quick-btn" onclick="setIncomePeriod(365,this)">This Year</button>
      <button class="quick-btn" onclick="setIncomePeriod(0,this)">All Time</button>
      <span style="color:var(--text3)">|</span>
      <label>From:</label>
      <input class="form-input" id="incFrom" type="date" style="width:140px;padding:7px 10px">
      <label>To:</label>
      <input class="form-input" id="incTo" type="date" style="width:140px;padding:7px 10px">
      <button class="btn btn-primary btn-sm" onclick="renderIncomeStatement()">Generate</button>
    </div>
    <div id="incomeStatement"></div>
  </div>

  <!-- BALANCE SHEET -->
  <div class="tab-panel" id="tab-balance">
    <div class="info-box">
      📊 The Balance Sheet shows your financial position <b>as of today</b>. Values pulled from
      <a href="balance-sheet-items.html" style="color:var(--accent)">Balance Sheet Items</a> plus auto-calculated values.
    </div>
    <div id="balanceSheet"></div>
  </div>
</div>

<div class="toast hidden" id="toast"><span id="toastIcon">✅</span> <span id="toastMsg"></span></div>
<script src="firebase-config.js"></script>
<script src="db.js"></script>
<script src="sidebar.js"></script>
<script>
function switchTab(tab, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  btn.classList.add('active');
  if (tab === 'balance') renderBalanceSheet();
}

function setIncomePeriod(days, btn) {
  document.querySelectorAll('.quick-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (days === 0) {
    document.getElementById('incFrom').value = '';
    document.getElementById('incTo').value = '';
  } else {
    const d = new Date(); d.setDate(d.getDate() - days + 1);
    document.getElementById('incFrom').value = d.toISOString().split('T')[0];
    document.getElementById('incTo').value = today();
  }
  renderIncomeStatement();
}

// ─── INCOME STATEMENT ────────────────────────
function renderIncomeStatement() {
  const from = document.getElementById('incFrom').value;
  const to   = document.getElementById('incTo').value;
  const label = from && to ? `${from} to ${to}` : from ? `From ${from}` : to ? `Up to ${to}` : 'All Time';
  const { totSales, totSvc, totRev, totPurch, closingStock, cogs,
          grossProfit, totOpExp, expLines, netIncome } = calcNetIncome(from, to);

  document.getElementById('incomeStatement').innerHTML = `
  <div class="report-wrap">
    <div class="report-header">
      <div class="report-company">Students Point</div>
      <div class="report-title">Income Statement</div>
      <div class="report-date">Period: ${label} &nbsp;·&nbsp; Generated: ${new Date().toLocaleDateString('en-IN')}</div>
    </div>
    <table class="rep-table">
      <tr><td class="particulars" style="font-weight:700;font-size:13px;padding-bottom:4px">Particulars</td>
          <td class="amount" style="font-weight:700;font-size:13px;padding-bottom:4px">Tk.</td>
          <td class="amount" style="font-weight:700;font-size:13px;padding-bottom:4px">Tk.</td></tr>

      <!-- REVENUES -->
      <tr class="sec-head"><td colspan="3">Revenues:</td></tr>
      <tr><td class="particulars indent">Sales Revenue</td><td></td><td class="amount">৳${fmt(totSales)}</td></tr>
      <tr><td class="particulars indent">Service Revenue</td><td></td><td class="amount">৳${fmt(totSvc)}</td></tr>
      <tr class="sub-total">
        <td class="particulars" style="font-weight:700">Total Revenue</td>
        <td></td><td class="amount" style="font-weight:800;color:var(--success)">৳${fmt(totRev)}</td>
      </tr>

      <tr><td colspan="3" style="padding:6px 0"></td></tr>

      <!-- COST OF GOODS SOLD -->
      <tr class="sec-head"><td colspan="3">Less: Cost of Goods Sold (COGS):</td></tr>
      <tr><td class="particulars indent">Opening Stock</td><td class="amount">৳0</td><td></td></tr>
      <tr><td class="particulars indent">Add: Purchases</td><td class="amount">৳${fmt(totPurch)}</td><td></td></tr>
      <tr><td class="particulars indent">Less: Closing Stock</td><td class="amount">(৳${fmt(closingStock)})</td><td></td></tr>
      <tr class="sub-total">
        <td class="particulars" style="font-weight:700">Total COGS</td>
        <td></td><td class="amount" style="font-weight:800;color:var(--danger)">৳${fmt(cogs)}</td>
      </tr>

      <tr><td colspan="3" style="padding:4px 0"></td></tr>
      <tr class="sub-total">
        <td class="particulars" style="font-weight:700">Gross Profit</td>
        <td></td><td class="amount" style="font-weight:800;color:${grossProfit>=0?'var(--success)':'var(--danger)'}">৳${fmt(grossProfit)}</td>
      </tr>

      <tr><td colspan="3" style="padding:6px 0"></td></tr>

      <!-- OPERATING EXPENSES — show each expense by name -->
      <tr class="sec-head"><td colspan="3">Less: Operating Expenses:</td></tr>
      ${expLines.length
        ? expLines.map(e =>
            `<tr><td class="particulars indent">${e.name} <span style="font-size:11px;color:var(--text3)">(${e.category})</span></td>
             <td class="amount">৳${fmt(e.amount)}</td><td></td></tr>`
          ).join('')
        : `<tr><td class="particulars indent" style="color:var(--text3)">No operating expenses</td><td class="amount">৳0</td><td></td></tr>`}
      <tr class="sub-total">
        <td class="particulars" style="font-weight:700">Total Operating Expenses</td>
        <td></td><td class="amount" style="font-weight:800;color:var(--danger)">৳${fmt(totOpExp)}</td>
      </tr>

      <tr><td colspan="3" style="padding:6px 0"></td></tr>

      <!-- NET INCOME -->
      <tr class="grand-total">
        <td class="particulars">Net Income</td>
        <td></td>
        <td class="amount" style="color:${netIncome>=0?'var(--success)':'var(--danger)'}">৳${fmt(netIncome)}</td>
      </tr>
    </table>
  </div>`;
}

// ─── BALANCE SHEET — A4 PORTRAIT, STANDARD ───
function renderBalanceSheet() {
  const dateStr = new Date().toLocaleDateString('en-IN', {year:'numeric',month:'long',day:'numeric'});

  // ASSETS
  const cash       = getCashSummary();
  const ar         = getARSummary();
  const inv        = getInvMap();
  const arNet      = Object.values(ar).reduce((a,b) => a + b.netBalance, 0);
  const stockVal   = Object.values(inv).reduce((a,b) => a + b.stockAmt, 0);
  const manualAssets = DB.assets || [];
  const totalManualAssets = manualAssets.reduce((a,b) => a + Number(b.balance), 0);
  const totalAssets = cash.onHand + arNet + stockVal + totalManualAssets;

  // LIABILITIES — includes asset credit purchases via getAPSummary
  const ap         = getAPSummary();
  const apNet      = Object.values(ap).reduce((a,b) => a + b.netBalance, 0);
  const manualLiab = DB.liabilities || [];
  const totalManualLiab = manualLiab.reduce((a,b) => a + Number(b.balance), 0);
  const totalLiab  = apNet + totalManualLiab;

  // EQUITY — uses all-time net income (standard for balance sheet)
  const { netIncome } = calcNetIncome('', '');
  const manualEquity  = DB.equity || [];
  const totalManualEquity = manualEquity.reduce((a,b) => a + Number(b.balance), 0);
  const totalEquity   = netIncome + totalManualEquity;
  const totalLiabEquity = totalLiab + totalEquity;
  const balanced = Math.abs(totalAssets - totalLiabEquity) < 1;

  document.getElementById('balanceSheet').innerHTML = `
  <div class="report-wrap">
    <div class="report-header">
      <div class="report-company">Students Point</div>
      <div class="report-title">Balance Sheet</div>
      <div class="report-date">As on ${dateStr}</div>
    </div>

    <!-- ASSETS -->
    <table class="rep-table" style="margin-bottom:20px">
      <tr class="sec-head"><td colspan="2">Assets:</td></tr>
      <tr><td class="particulars indent">Cash on Hand</td><td class="amount">৳${fmt(cash.onHand)}</td></tr>
      <tr><td class="particulars indent">Accounts Receivable</td><td class="amount">৳${fmt(arNet)}</td></tr>
      <tr><td class="particulars indent">Stock / Inventory (Closing)</td><td class="amount">৳${fmt(stockVal)}</td></tr>
      ${manualAssets.map(a=>`<tr><td class="particulars indent">${a.name}</td><td class="amount">৳${fmt(a.balance)}</td></tr>`).join('')}
      <tr class="grand-total">
        <td class="particulars">Total Assets</td>
        <td class="amount" style="color:var(--success)">৳${fmt(totalAssets)}</td>
      </tr>
    </table>

    <!-- LIABILITIES -->
    <table class="rep-table" style="margin-bottom:20px">
      <tr class="sec-head"><td colspan="2">Liabilities:</td></tr>
      <tr><td class="particulars indent">Accounts Payable</td><td class="amount">৳${fmt(apNet)}</td></tr>
      ${manualLiab.map(l=>`<tr><td class="particulars indent">${l.name}</td><td class="amount">৳${fmt(l.balance)}</td></tr>`).join('')}
      <tr class="sub-total">
        <td class="particulars" style="font-weight:700">Total Liabilities</td>
        <td class="amount" style="font-weight:800;color:var(--danger)">৳${fmt(totalLiab)}</td>
      </tr>
    </table>

    <!-- EQUITY -->
    <table class="rep-table" style="margin-bottom:14px">
      <tr class="sec-head"><td colspan="2">Equity:</td></tr>
      ${manualEquity.map(e=>`<tr><td class="particulars indent">${e.name}</td><td class="amount">৳${fmt(e.balance)}</td></tr>`).join('')}
      <tr><td class="particulars indent">Retained Earnings (Net Income)</td>
          <td class="amount" style="color:${netIncome>=0?'var(--success)':'var(--danger)'}">৳${fmt(netIncome)}</td></tr>
      <tr class="sub-total">
        <td class="particulars" style="font-weight:700">Total Equity</td>
        <td class="amount" style="font-weight:800;color:var(--success)">৳${fmt(totalEquity)}</td>
      </tr>
      <tr class="grand-total">
        <td class="particulars">Total Liabilities and Equity</td>
        <td class="amount" style="color:var(--accent)">৳${fmt(totalLiabEquity)}</td>
      </tr>
    </table>

    <!-- BALANCE CHECK -->
    <div style="padding:10px 14px;border-radius:8px;font-size:13px;
      background:${balanced?'#f0fdf4':'#fff1f2'};
      border:1px solid ${balanced?'#bbf7d0':'#fecdd3'};
      color:${balanced?'var(--success)':'var(--danger)'}">
      ${balanced
        ? '✅ Balance Sheet is balanced (Assets = Liabilities + Equity)'
        : '⚠️ Not balanced. Difference: ৳'+fmt(Math.abs(totalAssets-totalLiabEquity))+'. Check Balance Sheet Items.'}
    </div>
  </div>`;
}

(async () => {
  if (!requireAuth()) return;
  await loadDB();
  const hash = location.hash;
  buildSidebar(hash==='#balance'?'balance':'income');
  const d = new Date(); d.setDate(1);
  document.getElementById('incFrom').value = d.toISOString().split('T')[0];
  document.getElementById('incTo').value = today();
  renderIncomeStatement();
  if (hash === '#balance') {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn')[1].classList.add('active');
    document.getElementById('tab-balance').classList.add('active');
    renderBalanceSheet();
  }
})();
</script>
</body>
</html>
