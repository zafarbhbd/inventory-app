<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Students Point — Login</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="stylesheet" href="style.css">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="bcrypt.min.js"></script>
<script>var bcrypt = dcodeIO.bcrypt;</script>
</head>
<body>
<div class="login-wrap">
  <div class="login-box">
    <div class="login-logo">Students Point</div>
    <div class="login-sub">Accounting &amp; Inventory Management System</div>
    <label class="lbl">Username</label>
    <input class="linput" id="loginUser" type="text" placeholder="Enter username" autocomplete="off">
    <label class="lbl">Password</label>
    <input class="linput" id="loginPass" type="password" placeholder="Enter password">
    <button class="lbtn" onclick="doLogin()">Sign In →</button>
    <div class="lerr" id="loginErr"></div>
  </div>
</div>
<div class="toast hidden" id="toast"><span id="toastIcon">✅</span><span id="toastMsg"></span></div>
<script src="firebase-config.js"></script>
<script src="db.js"></script>
<script>
if (localStorage.getItem('spUser')) { window.location.href = 'dashboard.html'; }
async function doLogin() {
  const u = document.getElementById('loginUser').value.trim();
  const p = document.getElementById('loginPass').value;
  document.getElementById('loginErr').textContent = '';
  if (!u || !p) { document.getElementById('loginErr').textContent = 'Please enter username and password.'; return; }
  showLoader('Signing in…');
  await loadDB();
  const matchedUser = (window.DB.users||[]).find(x => x.username === u);
  const user = matchedUser && await bcrypt.compare(p, matchedUser.password) ? matchedUser : null;
  hideLoader();
  if (!user) { document.getElementById('loginErr').textContent = '❌ Invalid username or password.'; return; }
  localStorage.setItem('spUser', JSON.stringify(user));
  window.location.href = 'dashboard.html';
}
document.getElementById('loginPass').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
</script>
</body>
</html>
