<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventory — Students Point</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="stylesheet" href="style.css">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
</head>
<body>
<div id="sidebar-root"></div>
<div class="main">
  <div class="pg-header">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px">
      <div>
        <div class="pg-title">Inventory</div>
        <div class="pg-sub">Live stock levels — auto-calculated from all transactions</div>
      </div>
      <button class="btn btn-primary" onclick="window.print()">🖨️ Print Inventory</button>
    </div>
  </div>

  <!-- Summary cards -->
  <div class="cards-grid cards-4" id="invCards"></div>

  <!-- Low stock alert -->
  <div id="invAlerts"></div>

  <div class="tbox">
    <div class="tbox-hdr">
      <span class="tbox-title">📦 Stock Summary</span>
      <input class="search-input" style="width:200px" placeholder="🔍 Search…" oninput="renderInventory(this.value)">
    </div>
    <table>
      <thead><tr>
        <th>HSN Code</th><th>Product Name</th><th>Cost (৳)</th>
        <th>Purchased</th><th>Took (Credit)</th><th>Sold</th><th>Gave (Credit)</th>
        <th>Stock</th><th>Stock Value (৳)</th><th>Status</th>
      </tr></thead>
      <tbody id="inventoryTable"></tbody>
    </table>
  </div>
</div>

<div class="toast hidden" id="toast"><span id="toastIcon">✅</span> <span id="toastMsg"></span></div>
<script src="firebase-config.js"></script>
<script src="db.js"></script>
<script src="sidebar.js"></script>
<script>
function renderInventory(q=''){
  const inv=getInvMap();
  const entries=Object.entries(inv).filter(([k,i])=>!q||(i.name+k).toLowerCase().includes(q.toLowerCase()));
  const totalStock=entries.reduce((a,[,i])=>a+i.stockAmt,0);
  const totalUnits=entries.reduce((a,[,i])=>a+i.stock,0);
  const outOf=entries.filter(([,i])=>i.stock<=0).length;
  const lowOf=entries.filter(([,i])=>i.stock>0&&i.stock<=5).length;
  document.getElementById('invCards').innerHTML=`
    <div class="card bl-blue"><div class="card-lbl">Total Products</div><div class="card-val blue">${entries.length}</div><div class="card-sub">In catalog</div></div>
    <div class="card bl-green"><div class="card-lbl">Total Stock Units</div><div class="card-val green">${totalUnits}</div><div class="card-sub">Across all products</div></div>
    <div class="card bl-teal"><div class="card-lbl">Stock Value</div><div class="card-val teal">৳${fmt(totalStock)}</div><div class="card-sub">At cost price</div></div>
    <div class="card bl-${outOf>0?'red':'green'}"><div class="card-lbl">Out of Stock</div><div class="card-val ${outOf>0?'red':'green'}">${outOf}</div><div class="card-sub">${lowOf} low stock items</div></div>`;

  const low=entries.filter(([,i])=>i.stock<=5&&i.purchased>0);
  const alertEl=document.getElementById('invAlerts');
  if(!low.length){
    alertEl.innerHTML='';
  } else {
    alertEl.innerHTML=`<div class="alert-box alert-warn">
      <div class="alert-title" style="color:var(--warning)">⚠️ Low / Out of Stock (${low.length} items)</div>
      ${low.map(([,i])=>`<div class="alert-row">• <b>${i.name}</b> — ${i.stock<=0?'<span style="color:var(--danger)">OUT OF STOCK</span>':'<span style="color:var(--warning)">'+i.stock+' units left</span>'}</div>`).join('')}
    </div>`;
  }

  document.getElementById('inventoryTable').innerHTML=entries.length
    ?entries.map(([hsn,i])=>{
      const pct=i.purchased>0?Math.min(100,Math.round(i.stock/i.purchased*100)):0;
      const col=pct>40?'var(--success)':pct>15?'var(--warning)':'var(--danger)';
      const status=i.stock<=0?'<span class="pill pill-red">Out of Stock</span>':i.stock<=5?'<span class="pill pill-yellow">Low Stock</span>':'<span class="pill pill-green">In Stock</span>';
      return `<tr>
        <td><span class="pill pill-blue">${hsn}</span></td>
        <td><b>${i.name}</b></td><td>৳${fmt(i.cost)}</td>
        <td>${i.purchased}</td>
        <td>${i.ledgerTook>0?`<span class="pill pill-teal">${i.ledgerTook}</span>`:'0'}</td>
        <td>${i.sold}</td>
        <td>${i.ledgerGave>0?`<span class="pill pill-yellow">${i.ledgerGave}</span>`:'0'}</td>
        <td><b>${i.stock}</b>
          <div class="stock-bar-wrap"><div class="stock-bar" style="width:${pct}%;background:${col}"></div></div>
        </td>
        <td>৳${fmt(i.stockAmt)}</td>
        <td>${status}</td></tr>`;
    }).join('')
    :'<tr class="empty-row"><td colspan="10">No inventory data</td></tr>';
}

(async()=>{
  if(!requireAuth()) return;
  await loadDB();
  buildSidebar('inventory');
  renderInventory();
})();
</script>
</body>
</html>
